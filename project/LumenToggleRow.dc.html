<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 2px;border-bottom:{{ borderStyle }};font-family:'Geist',sans-serif">
  <div style="min-width:0">
    <div style="font-size:16px;color:#1B1A16">{{ title }}</div>
    <div style="font-size:13px;color:#8C877B">{{ sub }}</div>
  </div>
  <div onClick="{{ onToggle }}" style="width:40px;height:23px;border-radius:12px;background:{{ trackBg }};position:relative;cursor:pointer;transition:background .2s;flex-shrink:0">
    <div style="position:absolute;left:2px;top:2px;width:19px;height:19px;border-radius:50%;background:#fff;transform:{{ knobTx }};transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:56},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tìm web&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sub&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Mô tả ngắn&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;on&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#BE6A3A&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;last&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const on = !!this.props.on;
    const accent = this.props.accent ?? '#BE6A3A';
    return {
      title: this.props.title, sub: this.props.sub, onToggle: this.props.onToggle,
      trackBg: on ? accent : '#E0DCD0', knobTx: on ? 'translateX(17px)' : 'translateX(0)',
      borderStyle: this.props.last ? 'none' : '1px solid #F0EBE0'
    };
  }
}
</script>
</body>
</html>
