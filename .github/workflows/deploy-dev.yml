# Auto-deploy env dev sau khi CI xanh trên main. Prod luôn deploy tay.
# Cần GH secret CLOUDFLARE_API_TOKEN (Workers Scripts: Edit) — khi chưa có,
# job kết thúc sớm với notice thay vì đỏ.
name: Deploy dev
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
concurrency: deploy-dev
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build web
        run: npm run build --workspace=@nova/web
      - name: Deploy nova-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN chưa cấu hình — bỏ qua deploy dev"
            exit 0
          fi
          cd apps/api && npx wrangler deploy --env dev
