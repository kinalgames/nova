<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Nova</title>
    <script>
      // pre-paint theme: paint the page background in the right tone BEFORE
      // CSS/JS arrive so a dark-mode boot never flashes white
      try {
        var key = location.pathname.indexOf('/demo') === 0 ? 'nova.flow.demo.v5' : 'nova.flow.settings.v5'
        var theme = (JSON.parse(localStorage.getItem(key) || '{}').theme) || 'light'
        var dark = theme === 'dark' || (theme === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.style.background = dark ? '#16130f' : '#fbfaf6'
        // .dark on <html> pre-paint so portaled surfaces (Radix dialogs/menus
        // mount on body) inherit dark tokens from the very first frame; the
        // store effect keeps it in sync on runtime theme toggles
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) { /* first paint keeps the default */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
